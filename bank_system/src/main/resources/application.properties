spring.application.name=bank_system

# SQL Server connection properties
spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=bankdb;encrypt=false;trustServerCertificate=true
spring.datasource.username=carol.rivera
spring.datasource.password=1234
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Initialize SQL files on startup
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.encoding=UTF-8
spring.sql.init.continue-on-error=true

# JPA / Hibernate configuration for development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.security.user.name=admin
spring.security.user.password=admin123