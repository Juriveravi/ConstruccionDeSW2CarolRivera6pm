spring.application.name=bank_system

# SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=bankdb;encrypt=false;trustServerCertificate=true
spring.datasource.username=${BANK_DB_USERNAME:}
spring.datasource.password=${BANK_DB_PASSWORD:}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.encoding=UTF-8
spring.sql.init.continue-on-error=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# MongoDB local
spring.data.mongodb.host=${MONGODB_HOST:localhost}
spring.data.mongodb.port=${MONGODB_PORT:27017}
spring.data.mongodb.database=${MONGODB_DATABASE:bank_logs}
spring.data.mongodb.auto-index-creation=true

server.port=8081

# Transfer approval threshold
bank.transfer.approval-threshold=5000000